<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configure Hotkey</title>
  <link rel="stylesheet" href="hotkey-config.css">
</head>
<body>
  <div class="container">
    <h2>Configure Hotkey</h2>

    <div class="current-hotkey">
      Current hotkey: <strong id="current-hotkey">CommandOrControl+Space</strong>
    </div>

    <div class="form-group">
      <label>New Hotkey:</label>
      <div class="hotkey-recorder" id="hotkeyRecorder" tabindex="0">
        <span class="recorder-idle" id="recorderIdle">Click to record</span>
        <span class="recorder-listening" id="recorderListening" style="display:none">Press key combination...</span>
        <div class="recorder-keys" id="recorderKeys" style="display:none"></div>
      </div>
      <div class="help-text">Click the box and press your desired key combination</div>
    </div>

    <div class="button-group">
      <button class="btn-secondary" id="cancelBtn">Cancel</button>
      <button class="btn-primary" id="saveBtn">Save</button>
    </div>
  </div>

  <script src="renderer/hotkey-config.js"></script>
</body>
</html>
