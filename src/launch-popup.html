<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoE Ratio Calculator</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      padding: 8px;
    }

    .popup {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      height: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(201, 170, 113, 0.7);
      border-radius: 14px;
      background:
        radial-gradient(circle at top left, rgba(201, 170, 113, 0.18), transparent 38%),
        linear-gradient(135deg, rgba(40, 33, 24, 0.96), rgba(18, 17, 15, 0.98));
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
      color: #f4ead6;
      animation: popup-life 10s ease forwards;
    }

    .icon {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #d1b078, #8b6934);
      color: #1b1712;
      font-size: 20px;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .content {
      min-width: 0;
    }

    .title {
      margin: 0 0 4px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .message {
      margin: 0;
      font-size: 12px;
      line-height: 1.4;
      color: rgba(244, 234, 214, 0.78);
    }

    kbd {
      display: inline-block;
      padding: 0 6px;
      margin: 0 2px;
      border: 1px solid rgba(209, 176, 120, 0.6);
      border-radius: 5px;
      background: rgba(14, 14, 13, 0.8);
      color: #f8e9c8;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 11px;
      line-height: 1.6;
      letter-spacing: 0.01em;
      box-shadow: inset 0 -1px 0 rgba(209, 176, 120, 0.25);
      vertical-align: baseline;
    }

    @keyframes popup-life {
      0% {
        opacity: 0;
        transform: translateY(12px) scale(0.98);
      }

      12% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      82% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translateY(10px) scale(0.99);
      }
    }
  </style>
</head>
<body>
  <div class="popup">
    <div class="icon">
      <img src="../assets/divine_icon.png" alt="Icon" width="40" height="40">
    </div>
    <div class="content">
      <p class="title">PoE Ratio Calculator is running</p>
      <p class="message">Press <kbd id="popupHotkey">CommandOrControl+Space</kbd> to open the overlay.</p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const configuredHotkey = params.get("hotkey");

    if (configuredHotkey) {
      const hotkeyElement = document.getElementById("popupHotkey");
      hotkeyElement.textContent = configuredHotkey;
    }
  </script>
</body>
</html>
